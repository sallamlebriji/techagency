services:
  - type: web
    name: techagency-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run server
    healthCheckPath: /api/health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: techagency
      - key: FRONTEND_URL
        sync: false
